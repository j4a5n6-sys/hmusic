name: 构建 Android APK

# 触发条件：
# 1. 手动触发（在 GitHub 仓库 Actions 页点 Run workflow）
# 2. 推送 v* 格式的 tag 时自动触发（如 v3.0.1）
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 构建模式
        required: true
        default: both
        type: choice
        options:
          - universal
          - split-per-abi
          - both
  push:
    tags:
      - 'v*'

env:
  # Dart SDK 约束 >=3.7.2，需要 Flutter ≥ 3.29
  # 3.41.9 由 pub 解析器推荐（pubspec.lock 中部分依赖要求）
  FLUTTER_VERSION: '3.41.9'
  JAVA_VERSION: '17'

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 配置 Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 显示工具版本
        run: |
          flutter --version
          dart --version
          java -version

      - name: 读取项目版本号
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BUILD_NUMBER=$(grep "^version:" pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "📋 版本: $VERSION+$BUILD_NUMBER"

      - name: 拉取依赖
        run: flutter pub get

      - name: 静态分析（不阻断构建）
        run: flutter analyze lib/ || true

      - name: 配置签名（仅当 Secrets 已配置）
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️  未配置签名 Secrets，将产出未签名 / debug 签名 APK"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "🔐 解码 keystore..."
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat > android/key.properties <<EOF
          storeFile=app/release.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "✅ 已写入 android/key.properties"
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: 准备输出目录
        run: mkdir -p build/release build/symbols

      - name: 构建通用版 APK
        if: github.event_name == 'push' || inputs.build_mode == 'universal' || inputs.build_mode == 'both'
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/symbols
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/release/HMusic-v${{ steps.version.outputs.version }}-android-universal.apk
          echo "✅ 通用版构建完成"
          ls -lh build/release/

      - name: 构建分架构 APK
        if: github.event_name == 'push' || inputs.build_mode == 'split-per-abi' || inputs.build_mode == 'both'
        run: |
          flutter build apk --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/symbols
          for abi in arm64-v8a armeabi-v7a x86_64; do
            src="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            dst="build/release/HMusic-v${{ steps.version.outputs.version }}-android-${abi}.apk"
            if [ -f "$src" ]; then
              cp "$src" "$dst"
              echo "✅ ${abi}: $(du -h "$dst" | cut -f1)"
            fi
          done
          ls -lh build/release/

      - name: 生成 SHA-256 校验和
        working-directory: build/release
        run: |
          sha256sum *.apk > checksums.txt
          echo "📋 校验和:"
          cat checksums.txt

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: HMusic-v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          path: |
            build/release/*.apk
            build/release/checksums.txt
          retention-days: 30
          compression-level: 0

      - name: 上传调试符号
        uses: actions/upload-artifact@v4
        with:
          name: HMusic-v${{ steps.version.outputs.version }}-symbols-build${{ github.run_number }}
          path: build/symbols/
          retention-days: 90

      - name: 创建 Release（仅 tag 触发时）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/*.apk
            build/release/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理敏感文件
        if: always()
        run: |
          rm -f android/key.properties
          rm -f android/app/release.keystore
